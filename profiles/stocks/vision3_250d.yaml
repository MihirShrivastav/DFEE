stock_id: vision3_250d
stock_name: Kodak Vision3 250D
stock_type: color_negative

adaptation:
  base_iso: 250
  default_strength: 1.00
  camera_cast_compensation_sensitivity: 0.75
  highlight_stress_sensitivity: 0.90
  shadow_noise_sensitivity: 0.82

tone_response:
  toe_strength: 0.30         # Very gentle shadow toe
  toe_length: 0.34           # Smooth shadow ranges
  midtone_contrast: 0.94     # Balanced cinema contrast scale
  shoulder_strength: 0.58    # Smooth highlight roll-off protection
  highlight_rolloff_start: 0.78  # Wide highlight headroom
  black_density_floor: 0.010  # Clean professional negative base fog
  channel_toe_mult:      [0.96, 0.98, 1.04]  # Balanced daylight curve
  channel_shoulder_mult: [0.92, 0.98, 1.08]
  channel_midtone_mult:  [1.00, 1.00, 1.00]

color_response:
  shadow_bias_lab: [0.0, -0.5, -1.0]     # Subtle cool-cyan shadows
  midtone_bias_lab: [0.0, 0.4, 0.8]      # Rich, organic skin midtones
  highlight_bias_lab: [0.0, 0.0, 0.5]    # Soft daylight highlights
  blue_cast_suppression: 0.20
  green_magenta_stabilization: 0.35

hue_saturation_response:
  saturation_boost: 1.15          # Vibrant, rich, natural colors
  red_orange_midtone_compression: 0.42   # Compresses red/orange midtones to protect skin tones
  yellow_green_muting: 0.25              # Organic greens
  cyan_blue_highlight_compression: 0.30
  neon_compression: 0.70
  highlight_desaturation: 0.55           # Clean highlights

grain:
  size: 0.38                 # Very fine cinema grain
  strength: 0.28             # Subtle, organic cinema grain texture
  chroma_strength: 0.04      # Almost imperceptible color grain noise
  peak_zone: lower_mid_to_mid
  texture_masking: 0.82

halation:
  trigger: specular_only
  strength: 0.10             # Very subtle cinema halation
  radius_inner: 4
  radius_outer: 14
  warm_core: [1.0, 0.55, 0.25]
  red_fringe: [1.0, 0.10, 0.02]

scanner:
  style: frontier_soft
  contrast: 1.00
  warmth: 0.08
  output_sharpening: 0.10

chroma_coupling:
  hi_rolloff_start: 0.78
  hi_rolloff_rate:  1.4
  hi_compression:   0.45
  sh_rolloff_start: 0.16
  sh_compression:   0.40
  hi_hue_conv_rad:  0.32
  hi_hue_conv_str:  0.22

dye_contamination:
  r_to_g: 0.026
  g_to_r: 0.012
  b_to_g: 0.009
  b_to_r: 0.004
  r_to_b: 0.000
  g_to_b: 0.004
