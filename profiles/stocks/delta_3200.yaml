stock_id: delta_3200
stock_name: Ilford Delta 3200
stock_type: monochrome

adaptation:
  base_iso: 3200
  default_strength: 1.00
  camera_cast_compensation_sensitivity: 0.50
  highlight_stress_sensitivity: 0.82
  shadow_noise_sensitivity: 0.88               # High noise tolerance for high speed film

tone_response:
  toe_strength: 0.32         # Extremely long, soft toe — deep shadows retain grain and details
  toe_length: 0.42           # Vast shadow dynamic range entry
  midtone_contrast: 0.90     # Sub-unity contrast scale typical of fast film pushed or developed flat
  shoulder_strength: 0.62    # Gentle highlight compression
  highlight_rolloff_start: 0.72
  black_density_floor: 0.015  # High speed base fog — raised blacks and grain density
  channel_toe_mult:      [1.0, 1.0, 1.0]
  channel_shoulder_mult: [1.0, 1.0, 1.0]
  channel_midtone_mult:  [1.0, 1.0, 1.0]

color_response:
  # Monochrome uses color response to specify color filter behavior (spectral sensitivity)
  # Typical panchromatic spectral weights
  shadow_bias_lab: [0.0, 0.0, 0.0]
  midtone_bias_lab: [0.0, 0.0, 0.0]
  highlight_bias_lab: [0.0, 0.0, 0.0]
  blue_cast_suppression: 0.0
  green_magenta_stabilization: 0.0

hue_saturation_response:
  saturation_boost: 1.0           # Monochrome — fully desaturated
  red_orange_midtone_compression: 1.00
  yellow_green_muting: 1.00
  cyan_blue_highlight_compression: 1.00
  neon_compression: 1.00
  highlight_desaturation: 1.00

grain:
  size: 0.85                 # Extremely large halide grain structure (signature Delta 3200 grit)
  strength: 0.78             # Very coarse, organic grain texture
  chroma_strength: 0.00      # pure monochrome luminance grain
  peak_zone: midtones_heavy
  texture_masking: 0.35      # Minimal masking so grain is clearly visible across shadows and midtones

halation:
  trigger: specular_only
  strength: 0.12             # Subtle haloing/diffuse blooming in bright lights
  radius_inner: 4
  radius_outer: 16
  warm_core: [1.0, 1.0, 1.0] # White highlight halations for B&W
  red_fringe: [1.0, 1.0, 1.0]

scanner:
  style: darkroom_print
  contrast: 1.06             # Punchy black and white print style
  warmth: 0.00
  output_sharpening: 0.10

chroma_coupling:
  hi_rolloff_start: 0.70
  hi_rolloff_rate:  2.0
  hi_compression:   0.00
  sh_rolloff_start: 0.18
  sh_compression:   0.00
  hi_hue_conv_rad:  0.0
  hi_hue_conv_str:  0.0

dye_contamination:
  r_to_g: 0.00
  g_to_r: 0.00
  b_to_g: 0.00
  b_to_r: 0.00
  r_to_b: 0.00
  g_to_b: 0.00
