stock_id: eastman_double_x
stock_name: Eastman Double-X 5222
stock_type: monochrome

adaptation:
  base_iso: 250
  default_strength: 1.00
  camera_cast_compensation_sensitivity: 0.50
  highlight_stress_sensitivity: 0.85
  shadow_noise_sensitivity: 0.85

tone_response:
  toe_strength: 0.48         # Abrupt shadow toe giving deep, rich blacks
  toe_length: 0.30           # Snappy shadow transitions
  midtone_contrast: 1.12     # Gritty, high-contrast classic movie look
  shoulder_strength: 0.65    # Gentle highlight shoulder rolloff
  highlight_rolloff_start: 0.74  # Holds highlights well but snappier than modern B&W print
  black_density_floor: 0.008  # Deep cinema blacks
  channel_toe_mult:      [1.0, 1.0, 1.0]
  channel_shoulder_mult: [1.0, 1.0, 1.0]
  channel_midtone_mult:  [1.0, 1.0, 1.0]

color_response:
  # Monochrome uses color response to specify color filter behavior (spectral sensitivity)
  # Classic Hollywood panchromatic mix
  shadow_bias_lab: [0.0, 0.0, 0.0]
  midtone_bias_lab: [0.0, 0.0, 0.0]
  highlight_bias_lab: [0.0, 0.0, 0.0]
  blue_cast_suppression: 0.0
  green_magenta_stabilization: 0.0
  pan_weight_r: 0.26         # Classic panchromatic red sensitivity for beautiful movie skin tones
  pan_weight_g: 0.54
  pan_weight_b: 0.20

hue_saturation_response:
  saturation_boost: 1.0           # Fully desaturated
  red_orange_midtone_compression: 1.00
  yellow_green_muting: 1.00
  cyan_blue_highlight_compression: 1.00
  neon_compression: 1.00
  highlight_desaturation: 1.00

grain:
  size: 0.62                 # Coarser cinema grain structure
  strength: 0.55             # Heavy, organic, gritty grain texture
  chroma_strength: 0.00      # Pure monochrome grain
  peak_zone: midtones_heavy
  texture_masking: 0.60      # Low acutance masking (grain is highly visible in detail areas)

halation:
  trigger: specular_only
  strength: 0.15             # Classic B&W halation (white blooming halo around strong specular highlights)
  radius_inner: 5
  radius_outer: 18
  warm_core: [1.0, 1.0, 1.0]
  red_fringe: [1.0, 1.0, 1.0]

scanner:
  style: darkroom_print
  contrast: 1.12             # Gritty B&W print scan contrast
  warmth: 0.00
  output_sharpening: 0.10

chroma_coupling:
  hi_rolloff_start: 0.70
  hi_rolloff_rate:  2.0
  hi_compression:   0.00
  sh_rolloff_start: 0.18
  sh_compression:   0.00
  hi_hue_conv_rad:  0.0
  hi_hue_conv_str:  0.0

dye_contamination:
  r_to_g: 0.00
  g_to_r: 0.00
  b_to_g: 0.00
  b_to_r: 0.00
  r_to_b: 0.00
  g_to_b: 0.00
