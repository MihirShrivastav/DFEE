stock_id: astia_100
stock_name: Fujifilm Astia 100
stock_type: color_reversal

adaptation:
  base_iso: 100
  default_strength: 0.96
  camera_cast_compensation_sensitivity: 0.35
  highlight_stress_sensitivity: 0.85
  shadow_noise_sensitivity: 0.42

tone_response:
  toe_strength: 0.44         # Softest slide toe — open, gentle shadow gradations
  toe_length: 0.32           # Relatively long shadow transition for E-6
  midtone_contrast: 1.06     # Moderate contrast, softest of the Fuji reversal family
  shoulder_strength: 0.78    # Strong but gentle highlight shoulder
  highlight_rolloff_start: 0.70  # Better highlight headroom than Velvia
  black_density_floor: 0.004  # Reversal deep black floor
  channel_toe_mult:      [1.00, 0.98, 1.05]
  channel_shoulder_mult: [1.00, 0.96, 1.08]
  channel_midtone_mult:  [0.98, 1.02, 1.00]  # Smooth green rendering

color_response:
  shadow_bias_lab: [0.0, -0.5, -2.0]     # Delicate cool-cyan/blue shadows
  midtone_bias_lab: [0.0, 0.4, 0.8]      # Soft, realistic skin tones
  highlight_bias_lab: [0.1, 0.2, 1.0]     # Soft highlights
  blue_cast_suppression: 0.30
  green_magenta_stabilization: 0.35

hue_saturation_response:
  saturation_boost: 1.15          # Subdued portrait slide saturation
  red_orange_midtone_compression: 0.45   # Strong desaturation of skin tones to prevent harsh redness
  yellow_green_muting: 0.25              # Gentle, painterly foliage greens
  cyan_blue_highlight_compression: 0.30
  neon_compression: 0.60
  highlight_desaturation: 0.35

grain:
  size: 0.12                 # Very fine grain
  strength: 0.10             # Clean, tight grain structure
  chroma_strength: 0.01      # Negligible chromatic grain noise
  peak_zone: lower_mid_to_mid
  texture_masking: 0.82

halation:
  trigger: specular_only
  strength: 0.05             # Minimal halation
  radius_inner: 2
  radius_outer: 8
  warm_core: [1.0, 0.80, 0.60]
  red_fringe: [1.0, 0.10, 0.02]

scanner:
  style: frontier_soft
  contrast: 1.02             # Natural, flatter scan to retain soft portrait character
  warmth: 0.04
  output_sharpening: 0.18

chroma_coupling:
  hi_rolloff_start: 0.72
  hi_rolloff_rate:  2.8
  hi_compression:   0.65
  sh_rolloff_start: 0.16
  sh_compression:   0.50
  hi_hue_conv_rad:  0.20
  hi_hue_conv_str:  0.15

dye_contamination:
  r_to_g: 0.00
  g_to_r: 0.00
  b_to_g: 0.00
  b_to_r: 0.00
  r_to_b: 0.00
  g_to_b: 0.00
