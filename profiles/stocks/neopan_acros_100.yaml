stock_id: neopan_acros_100
stock_name: Fuji Neopan Acros 100
stock_type: monochrome

adaptation:
  base_iso: 100
  default_strength: 1.00
  camera_cast_compensation_sensitivity: 0.45
  highlight_stress_sensitivity: 0.88
  shadow_noise_sensitivity: 0.92

tone_response:
  toe_strength: 0.38         # Smooth shadow detail entry, deep but legible blacks
  toe_length: 0.32           # Gentle shadow graduation
  midtone_contrast: 1.08     # Crisp midtone-to-highlight contrast
  shoulder_strength: 0.72    # Legendary highlight retention, rolls off beautifully
  highlight_rolloff_start: 0.80  # Late highlight shoulder, holding sky and bright tones
  black_density_floor: 0.004  # Velvety deep blacks with incredibly low base fog
  channel_toe_mult:      [1.0, 1.0, 1.0]
  channel_shoulder_mult: [1.0, 1.0, 1.0]
  channel_midtone_mult:  [1.0, 1.0, 1.0]

color_response:
  # Monochrome uses color response to specify color filter behavior (spectral sensitivity)
  # Acros is orthopanchromatic (green-yellow biased, depressed red sensitivity)
  shadow_bias_lab: [0.0, 0.0, 0.0]
  midtone_bias_lab: [0.0, 0.0, 0.0]
  highlight_bias_lab: [0.0, 0.0, 0.0]
  blue_cast_suppression: 0.0
  green_magenta_stabilization: 0.0
  pan_weight_r: 0.18         # Low red sensitivity, beautiful for portraits and clean skies
  pan_weight_g: 0.62         # Strong green sensitivity (Acros signature)
  pan_weight_b: 0.20

hue_saturation_response:
  saturation_boost: 1.0           # Fully desaturated
  red_orange_midtone_compression: 1.00
  yellow_green_muting: 1.00
  cyan_blue_highlight_compression: 1.00
  neon_compression: 1.00
  highlight_desaturation: 1.00

grain:
  size: 0.22                 # Extremely fine grain structure
  strength: 0.20             # Smooth, velvety, high-resolution texture
  chroma_strength: 0.00      # Pure monochrome grain
  peak_zone: midtones_heavy
  texture_masking: 0.88

halation:
  trigger: specular_only
  strength: 0.04             # Highly efficient Fuji anti-halation layer
  radius_inner: 3
  radius_outer: 12
  warm_core: [1.0, 1.0, 1.0]
  red_fringe: [1.0, 1.0, 1.0]

scanner:
  style: darkroom_print
  contrast: 1.10             # Rich contrast Scan/Print style
  warmth: 0.00
  output_sharpening: 0.12

chroma_coupling:
  hi_rolloff_start: 0.70
  hi_rolloff_rate:  2.0
  hi_compression:   0.00
  sh_rolloff_start: 0.18
  sh_compression:   0.00
  hi_hue_conv_rad:  0.0
  hi_hue_conv_str:  0.0

dye_contamination:
  r_to_g: 0.00
  g_to_r: 0.00
  b_to_g: 0.00
  b_to_r: 0.00
  r_to_b: 0.00
  g_to_b: 0.00
