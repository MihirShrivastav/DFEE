stock_id: delta_100
stock_name: Ilford Delta 100
stock_type: monochrome

adaptation:
  base_iso: 100
  default_strength: 1.00
  camera_cast_compensation_sensitivity: 0.50
  highlight_stress_sensitivity: 0.85
  shadow_noise_sensitivity: 0.90               # High noise tolerance for modern fine grain

tone_response:
  toe_strength: 0.45         # Firmer shadow toe than HP5, giving snappy contrast
  toe_length: 0.28           # Clean shadow entry transition
  midtone_contrast: 1.05     # Punchy midtones, characteristic of sharp B&W print film
  shoulder_strength: 0.68    # Extremely smooth highlight roll-off
  highlight_rolloff_start: 0.78  # High highlight dynamic range retention
  black_density_floor: 0.005  # Modern thin-emulsion low base fog (deep rich blacks)
  channel_toe_mult:      [1.0, 1.0, 1.0]
  channel_shoulder_mult: [1.0, 1.0, 1.0]
  channel_midtone_mult:  [1.0, 1.0, 1.0]

color_response:
  # Monochrome uses color response to specify color filter behavior (spectral sensitivity)
  # Standard panchromatic mix
  shadow_bias_lab: [0.0, 0.0, 0.0]
  midtone_bias_lab: [0.0, 0.0, 0.0]
  highlight_bias_lab: [0.0, 0.0, 0.0]
  blue_cast_suppression: 0.0
  green_magenta_stabilization: 0.0
  pan_weight_r: 0.22         # Orthopanchromatic-like sensitivity, green/yellow weighted
  pan_weight_g: 0.58
  pan_weight_b: 0.20

hue_saturation_response:
  saturation_boost: 1.0           # Fully desaturated
  red_orange_midtone_compression: 1.00
  yellow_green_muting: 1.00
  cyan_blue_highlight_compression: 1.00
  neon_compression: 1.00
  highlight_desaturation: 1.00

grain:
  size: 0.28                 # Very fine, tabular grain structure
  strength: 0.25             # Clean, subtle grain texture
  chroma_strength: 0.00      # Pure monochrome grain
  peak_zone: highlights_light # Grain is very fine, mostly visible in highlights
  texture_masking: 0.90      # High acutance masking

halation:
  trigger: specular_only
  strength: 0.05             # Highly efficient modern anti-halation layer
  radius_inner: 3
  radius_outer: 12
  warm_core: [1.0, 1.0, 1.0]
  red_fringe: [1.0, 1.0, 1.0]

scanner:
  style: darkroom_print
  contrast: 1.08             # Punchy black and white print style
  warmth: 0.00
  output_sharpening: 0.15

chroma_coupling:
  hi_rolloff_start: 0.70
  hi_rolloff_rate:  2.0
  hi_compression:   0.00
  sh_rolloff_start: 0.18
  sh_compression:   0.00
  hi_hue_conv_rad:  0.0
  hi_hue_conv_str:  0.0

dye_contamination:
  r_to_g: 0.00
  g_to_r: 0.00
  b_to_g: 0.00
  b_to_r: 0.00
  r_to_b: 0.00
  g_to_b: 0.00
