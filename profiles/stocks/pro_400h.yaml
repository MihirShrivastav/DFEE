stock_id: pro_400h
stock_name: Fujifilm Pro 400H
stock_type: color_negative

adaptation:
  base_iso: 400
  default_strength: 0.85
  camera_cast_compensation_sensitivity: 0.65
  highlight_stress_sensitivity: 0.60
  shadow_noise_sensitivity: 0.55

tone_response:
  toe_strength: 0.20         # Extremely gentle toe — Pro 400H's signature open shadows
  toe_length: 0.40           # Long, luminous shadow gradation
  midtone_contrast: 0.72     # Deliberately low contrast — high latitude, dreamy look
  shoulder_strength: 0.48    # Very soft shoulder — extraordinary highlight latitude
  highlight_rolloff_start: 0.82   # Very late rolloff — captures highlights other films clip
  black_density_floor: 0.014  # Some negative base fog, but soft
  channel_toe_mult:      [0.88, 0.93, 1.08]
  channel_shoulder_mult: [0.82, 0.93, 1.15]
  channel_midtone_mult:  [1.00, 1.00, 0.97]

color_response:
  # Pro 400H: legendary for luminous, cool-pink skin tones.
  # Cool-green shadows transition to a pinkish warmth in highlights.
  # This is the most beloved portrait film of the digital era.
  shadow_bias_lab: [0.0, -2.0, -2.5]     # Cool, slightly green-blue shadows
  midtone_bias_lab: [0.0, -0.8, -0.5]    # Cool-neutral midtones
  highlight_bias_lab: [0.5, 1.5, 0.5]    # Warm-pink, luminous highlights
  blue_cast_suppression: 0.10
  green_magenta_stabilization: 0.20

hue_saturation_response:
  saturation_boost: 1.05          # Deliberately muted — softness is the character
  red_orange_midtone_compression: 0.55   # Strong skin-tone protection — this is key
  yellow_green_muting: 0.35
  cyan_blue_highlight_compression: 0.35
  neon_compression: 0.82                 # Strong compression — pastels, not neons
  highlight_desaturation: 0.72           # Pastel, near-white highlights

grain:
  size: 0.38                 # Medium-fine grain (ISO 400 professional)
  strength: 0.30
  chroma_strength: 0.06
  peak_zone: lower_mid_to_mid
  texture_masking: 0.70

halation:
  trigger: specular_only
  strength: 0.08             # Professional film with remjet backing — minimal halation
  radius_inner: 5
  radius_outer: 20
  warm_core: [1.0, 0.65, 0.35]
  red_fringe: [1.0, 0.22, 0.08]

scanner:
  style: frontier_soft
  contrast: 0.88   # Scanned soft — Pro 400H always scanned low contrast to preserve its feel
  warmth: 0.05
  black_point: 0.010
  output_sharpening: 0.08

chroma_coupling:
  hi_rolloff_start: 0.77   # Widest latitude of all — rolloff starts very late
  hi_rolloff_rate:  1.3
  hi_compression:   0.42
  sh_rolloff_start: 0.16
  sh_compression:   0.40
  hi_hue_conv_rad:  0.32   # Slightly warmer pastel than Portra
  hi_hue_conv_str:  0.22

dye_contamination:
  r_to_g: 0.025
  g_to_r: 0.012
  b_to_g: 0.010
  b_to_r: 0.005
  r_to_b: 0.000
  g_to_b: 0.005
