stock_id: ektar_100
stock_name: Kodak Ektar 100
stock_type: color_negative

adaptation:
  base_iso: 100
  default_strength: 0.88
  camera_cast_compensation_sensitivity: 0.60
  highlight_stress_sensitivity: 0.72
  shadow_noise_sensitivity: 0.45

tone_response:
  toe_strength: 0.48         # Firmer, more decisive toe — Ektar blocks shadows faster giving rich contrast
  toe_length: 0.26           # Shorter toe transition — snappier shadow response than Portra
  midtone_contrast: 1.10     # Punchy midtones — higher contrast is Ektar's design goal
  shoulder_strength: 0.55    # Moderate shoulder — decent latitude but not Portra-wide
  highlight_rolloff_start: 0.72  # Earlier rolloff than Portra — less highlight headroom
  black_density_floor: 0.008  # Very fine grain emulsion — among the cleanest D-min of color neg films
  channel_toe_mult:      [0.95, 1.00, 1.12]
  channel_shoulder_mult: [0.90, 1.00, 1.18]
  channel_midtone_mult:  [1.02, 1.00, 0.96]

color_response:
  # Ektar: richest, most saturated colour negative. Warm reds, punchy skies.
  # Famous for vivid warm tones — reds/oranges border on overwhelming
  shadow_bias_lab: [0.0, 0.8, 0.5]       # Slightly warm shadows — no blue cast like Portra
  midtone_bias_lab: [0.0, 2.0, 2.5]      # Warm, vivid red-orange midtones
  highlight_bias_lab: [0.5, 1.5, 3.5]    # Golden, bright highlights — Ektar "sunlight" feel
  blue_cast_suppression: 0.35            # Suppress any blue tendency to keep warmth
  green_magenta_stabilization: 0.30

hue_saturation_response:
  saturation_boost: 1.38          # Ektar is the most saturated colour negative made
  red_orange_midtone_compression: 0.08   # Minimal compression — vivid reds are the point
  yellow_green_muting: 0.15
  cyan_blue_highlight_compression: 0.28  # Skies are deep blue on Ektar
  neon_compression: 0.62
  highlight_desaturation: 0.42

grain:
  size: 0.18                 # Exceptionally fine for colour negative (T-GRAIN technology)
  strength: 0.15
  chroma_strength: 0.025
  peak_zone: lower_mid_to_mid
  texture_masking: 0.75

halation:
  trigger: specular_only
  strength: 0.18
  radius_inner: 5
  radius_outer: 18
  warm_core: [1.0, 0.55, 0.22]
  red_fringe: [0.95, 0.18, 0.05]

scanner:
  style: noritsu_smooth
  contrast: 1.05
  warmth: 0.08
  output_sharpening: 0.22

chroma_coupling:
  hi_rolloff_start: 0.70
  hi_rolloff_rate:  1.6
  hi_compression:   0.55
  sh_rolloff_start: 0.18
  sh_compression:   0.48
  hi_hue_conv_rad:  0.28
  hi_hue_conv_str:  0.18

dye_contamination:
  r_to_g: 0.025   # C-41 negative: moderate inter-layer leakage
  g_to_r: 0.012
  b_to_g: 0.010
  b_to_r: 0.005
  r_to_b: 0.000
  g_to_b: 0.005
