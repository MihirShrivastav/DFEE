stock_id: ilford_delta_3200
stock_name: Ilford Delta 3200
stock_type: monochrome

adaptation:
  base_iso: 3200
  default_strength: 1.00
  camera_cast_compensation_sensitivity: 0.30
  highlight_stress_sensitivity: 0.95
  shadow_noise_sensitivity: 0.95

tone_response:
  toe_strength: 0.28         # Designed to be pushed, inherently very low contrast in shadows
  toe_length: 0.45           # Longest toe to preserve low-light detail
  midtone_contrast: 0.85     # Inherently flat unless pushed
  shoulder_strength: 0.45    # Holds extreme highlight bursts
  highlight_rolloff_start: 0.85
  black_density_floor: 0.018 # High speed base fog
  channel_toe_mult:      [1.0, 1.0, 1.0]
  channel_shoulder_mult: [1.0, 1.0, 1.0]
  channel_midtone_mult:  [1.0, 1.0, 1.0]

color_response:
  shadow_bias_lab: [0.0, 0.0, 0.0]
  midtone_bias_lab: [0.0, 0.0, 0.0]
  highlight_bias_lab: [0.0, 0.0, 0.0]
  blue_cast_suppression: 0.0
  green_magenta_stabilization: 0.0

hue_saturation_response:
  saturation_boost: 1.0
  red_orange_midtone_compression: 1.00
  yellow_green_muting: 1.00
  cyan_blue_highlight_compression: 1.00
  neon_compression: 1.00
  highlight_desaturation: 1.00

grain:
  size: 0.85                 # Massive grain structure
  strength: 0.80             # The defining characteristic of Delta 3200
  chroma_strength: 0.00
  peak_zone: lower_mid_to_mid
  texture_masking: 0.40      # Grain everywhere

halation:
  trigger: specular_only
  strength: 0.20             # Scatter from huge grain clusters
  radius_inner: 6
  radius_outer: 20
  warm_core: [1.0, 1.0, 1.0]
  red_fringe: [1.0, 1.0, 1.0]

scanner:
  style: darkroom_print
  contrast: 1.25   # Usually pushed significantly in processing/printing
  warmth: 0.00
  output_sharpening: 0.25

chroma_coupling:
  hi_rolloff_start: 0.70
  hi_rolloff_rate:  2.0
  hi_compression:   0.00
  sh_rolloff_start: 0.18
  sh_compression:   0.00
  hi_hue_conv_rad:  0.0
  hi_hue_conv_str:  0.0

dye_contamination:
  r_to_g: 0.00
  g_to_r: 0.00
  b_to_g: 0.00
  b_to_r: 0.00
  r_to_b: 0.00
  g_to_b: 0.00
