stock_id: fuji_eterna_250d
stock_name: Fujifilm Eterna 250D
stock_type: color_negative

adaptation:
  base_iso: 250
  default_strength: 1.00
  camera_cast_compensation_sensitivity: 0.70
  highlight_stress_sensitivity: 0.85
  shadow_noise_sensitivity: 0.85

tone_response:
  toe_strength: 0.22         # Extremely open shadows
  toe_length: 0.40           # Very gradual shadow entry transition
  midtone_contrast: 0.82     # Signature low contrast, pastel cinematic grade
  shoulder_strength: 0.52    # Very gentle highlight shoulder
  highlight_rolloff_start: 0.84  # Extremely late rolloff, holding bright highlights
  black_density_floor: 0.014  # Soft, slightly foggy blacks
  channel_toe_mult:      [0.98, 0.96, 0.94]
  channel_shoulder_mult: [0.95, 0.96, 0.92]
  channel_midtone_mult:  [0.96, 1.02, 1.02]  # Beautiful green-teal bias

color_response:
  shadow_bias_lab: [-0.2, -0.8, -1.5]    # Pastel teal shadows
  midtone_bias_lab: [0.0, 0.2, 0.4]      # Muted, delicate skin midtones
  highlight_bias_lab: [0.0, -0.1, 0.5]   # Soft cool highlights
  blue_cast_suppression: 0.15            # Keeps sky blues soft and muted
  green_magenta_stabilization: 0.45

hue_saturation_response:
  saturation_boost: 1.02          # Soft, muted pastel saturation scale
  red_orange_midtone_compression: 0.50   # High compression to protect skin details
  yellow_green_muting: 0.35              # Muted, desaturated greens
  cyan_blue_highlight_compression: 0.20
  neon_compression: 0.60
  highlight_desaturation: 0.70           # Highly desaturated highlights

grain:
  size: 0.35                 # Very fine, smooth Fujifilm cinema grain
  strength: 0.24             # Soft, non-intrusive grain texture
  chroma_strength: 0.02      # Almost invisible color grain noise
  peak_zone: lower_mid_to_mid
  texture_masking: 0.85

halation:
  trigger: specular_only
  strength: 0.08             # Minimal halation
  radius_inner: 3
  radius_outer: 12
  warm_core: [1.0, 0.50, 0.20]
  red_fringe: [1.0, 0.08, 0.01]

scanner:
  style: frontier_soft
  contrast: 0.90             # Soft scan to preserve low contrast Eterna look
  warmth: 0.02
  output_sharpening: 0.08

chroma_coupling:
  hi_rolloff_start: 0.80
  hi_rolloff_rate:  1.3
  hi_compression:   0.42
  sh_rolloff_start: 0.18
  sh_compression:   0.45
  hi_hue_conv_rad:  0.35
  hi_hue_conv_str:  0.25

dye_contamination:
  r_to_g: 0.020
  g_to_r: 0.010
  b_to_g: 0.008
  b_to_r: 0.003
  r_to_b: 0.000
  g_to_b: 0.004
