stock_id: cinestill_50d
stock_name: CineStill 50D
stock_type: color_negative

adaptation:
  base_iso: 50
  default_strength: 1.00
  camera_cast_compensation_sensitivity: 0.75
  highlight_stress_sensitivity: 0.92
  shadow_noise_sensitivity: 0.85

tone_response:
  toe_strength: 0.28         # Cinema stock: very gentle shadow toe transition
  toe_length: 0.38           # Long shadow latitude
  midtone_contrast: 0.88     # Softer midtones for high latitude
  shoulder_strength: 0.58    # Gentle highlight compression
  highlight_rolloff_start: 0.82  # Exceptional highlight dynamic range retention
  black_density_floor: 0.010  # Low D-min (clean professional shadow rendering)
  channel_toe_mult:      [1.00, 0.95, 0.90]  # Cool/teal shadow bias
  channel_shoulder_mult: [0.98, 0.96, 0.90]
  channel_midtone_mult:  [0.98, 1.00, 1.02]  # Neutral-to-cool midtones

color_response:
  shadow_bias_lab: [-0.5, -1.5, -3.0]    # Teal-blue shadow cast
  midtone_bias_lab: [0.0, 0.2, 0.5]      # Clean, natural midtones
  highlight_bias_lab: [0.0, -0.2, 0.8]   # Cool-neutral highlights
  blue_cast_suppression: 0.25            # Keep beautiful cinema sky blues
  green_magenta_stabilization: 0.40

hue_saturation_response:
  saturation_boost: 1.12          # Natural, subtle saturation
  red_orange_midtone_compression: 0.45   # Highly protective of skin tones
  yellow_green_muting: 0.25              # Pleasing organic foliage tones
  cyan_blue_highlight_compression: 0.30
  neon_compression: 0.70
  highlight_desaturation: 0.65           # Highly desaturated highlights

grain:
  size: 0.25                 # Ultra-fine grain structure (one of the finest color films)
  strength: 0.22             # Extremely clean, subtle grain texture
  chroma_strength: 0.04      # Almost imperceptible color grain noise
  peak_zone: lower_mid_to_mid
  texture_masking: 0.85

halation:
  trigger: specular_only
  strength: 0.38             # Very pronounced red halation (remjet-removed signature)
  radius_inner: 8
  radius_outer: 32           # Wide spreading red glow
  warm_core: [1.0, 0.50, 0.20]
  red_fringe: [1.0, 0.10, 0.02]

scanner:
  style: frontier_soft
  contrast: 0.95             # Flat, latitude-first scan style
  warmth: 0.05               # Neutral-cool scan warmth
  output_sharpening: 0.08

chroma_coupling:
  hi_rolloff_start: 0.82
  hi_rolloff_rate:  1.4
  hi_compression:   0.45
  sh_rolloff_start: 0.14
  sh_compression:   0.38
  hi_hue_conv_rad:  0.35
  hi_hue_conv_str:  0.25

dye_contamination:
  r_to_g: 0.025
  g_to_r: 0.010
  b_to_g: 0.008
  b_to_r: 0.004
  r_to_b: 0.000
  g_to_b: 0.004
